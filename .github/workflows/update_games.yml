name: Update games.json

on:
  schedule:
    # Каждые 6 часов: парсер работает инкрементально (см. backend/parser.py),
    # поэтому частые короткие прогоны быстрее доводят каталог до целевого
    # размера (10 000+ игр), чем один длинный прогон раз в сутки.
    - cron: '0 */6 * * *'
  workflow_dispatch: {}
  push:
    paths:
      - 'backend/custom_ids.txt'
      - 'backend/parser.py'

permissions:
  contents: write

concurrency:
  group: update-games-json
  cancel-in-progress: false

jobs:
  update-games:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run parser
        run: python backend/parser.py

      - name: Commit and push games.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add games.json backend/skipped_ids.json
          if git diff --cached --quiet; then
            echo "Нет изменений в games.json — коммит не нужен."
          else
            git commit -m "chore: автообновление games.json ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
